# Pipeline Docker — discord-bots-admin
# Construye y publica la imagen Docker en Docker Hub al hacer merge a la rama `implementacion`.
# Requiere GitHub Secrets: DOCKERHUB_USERNAME, DOCKERHUB_TOKEN.

name: Publicar imagen Docker

on:
  push:
    branches:
      - implementacion

permissions:
  contents: read

jobs:
  docker:
    name: Build, test y push imagen Docker
    runs-on: ubuntu-latest

    steps:

      - name: Validar secrets Docker Hub
        shell: bash
        run: |
          test -n "${{ secrets.DOCKERHUB_USERNAME }}" || { echo "Falta DOCKERHUB_USERNAME"; exit 1; }
          test -n "${{ secrets.DOCKERHUB_TOKEN }}" || { echo "Falta DOCKERHUB_TOKEN"; exit 1; }

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: global.json

      # Auto-versioning SemVer (estrategia-versionado_v1.0.md §3).
      - name: Calcular versión (nbgv)
        id: nbgv
        uses: dotnet/nbgv@v0.4
        with:
          setAllVars: true

      - name: Restore
        run: dotnet restore

      - name: Build Release
        run: dotnet build -c Release --no-restore -warnaserror

      - name: Tests con cobertura
        run: dotnet test -c Release --no-build --settings coverlet.runsettings --results-directory ./TestResults

      - name: Gate de cobertura
        shell: pwsh
        run: ./scripts/ci/verificar-cobertura.ps1

      # Tags: latest (para Portainer) + SHA corto (para trazabilidad y rollback).
      - name: Docker meta (tags y labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/discord-bot-moderador
          tags: |
            type=raw,value=latest
            type=sha,prefix=,suffix=,format=short

      - name: Login Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Buildx con driver docker-container: necesario para exportar la caché a registry
      # (el driver docker por defecto no soporta cache-to/cache-from type=registry).
      - name: Configurar Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build y push imagen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          # Caché de capas Docker entre corridas (acelera rebuilds cuando solo cambia el código).
          cache-from: type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/discord-bot-moderador:buildcache
          cache-to:   type=registry,ref=${{ secrets.DOCKERHUB_USERNAME }}/discord-bot-moderador:buildcache,mode=max
